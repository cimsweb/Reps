<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<template id="__bundler_thumbnail" data-bg-color="#ffffff">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <rect width="100" height="100" fill="#ffffff"/>
    <rect x="20" y="30" width="60" height="40" rx="8" fill="#1f9d55"/>
    <text x="50" y="55" font-size="22" text-anchor="middle" fill="#ffffff" font-family="sans-serif">✓</text>
  </svg>
</template>
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @keyframes ap-dot { 0%,80%,100%{ transform: scale(0.6); opacity:.4 } 40%{ transform: scale(1); opacity:1 } }
  </style>
</helmet>
<div style="{{ rootStyle }}">
  <div style="font-size:13px; font-weight:800; margin-bottom:2px;">Отчёт о тренировке</div>
  <div style="font-size:12px; color:var(--muted); font-weight:600; margin-bottom:14px;">{{ dayLabel }} · {{ workoutType }}</div>

  <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Короткий комментарий</div>
  <textarea value="{{ rawComment }}" onChange="{{ setRawComment }}" placeholder="Например: пробежала, было тяжело на 5-6 повторе, но темп держала" style="width:100%; min-height:56px; border:1.5px solid var(--input-border); border-radius:12px; padding:10px 12px; font-size:13px; resize:vertical; outline:none; margin-bottom:12px; background:var(--card); color:var(--text);"></textarea>

  <div onClick="{{ runAi }}" style="{{ aiButtonStyle }}">
    <sc-if value="{{ aiGenerating }}" hint-placeholder-val="{{ false }}">
      <span style="display:inline-flex; gap:3px;">
        <span style="width:5px;height:5px;border-radius:50%;background:#fff;display:inline-block;animation:ap-dot 1.2s infinite;"></span>
        <span style="width:5px;height:5px;border-radius:50%;background:#fff;display:inline-block;animation:ap-dot 1.2s infinite .2s;"></span>
        <span style="width:5px;height:5px;border-radius:50%;background:#fff;display:inline-block;animation:ap-dot 1.2s infinite .4s;"></span>
      </span>
      <span>ИИ пишет отчёт…</span>
    </sc-if>
    <sc-if value="{{ aiNotGenerating }}" hint-placeholder-val="{{ true }}">
      <span>✨ Составить отчёт с ИИ</span>
    </sc-if>
  </div>

  <sc-if value="{{ aiResult }}" hint-placeholder-val="{{ false }}">
    <div style="margin-top:12px;">
      <div style="font-size:10.5px; font-weight:700; color:#1f9d55; text-transform:uppercase; margin-bottom:6px;">Развёрнутое описание для тренера</div>
      <textarea value="{{ polishedText }}" onChange="{{ setPolishedText }}" style="width:100%; min-height:90px; border:1.5px solid var(--report-border); background:var(--report-bg); border-radius:12px; padding:10px 12px; font-size:13px; line-height:1.5; outline:none; color:var(--report-text);"></textarea>
    </div>
  </sc-if>

  <div style="height:1px; background:var(--divider); margin:14px 0;"></div>

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;">
    <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase;">Оценка нагрузки (RPE)</div>
    <div style="font-size:12px; font-weight:800; color:var(--text);">{{ rpe }}/10</div>
  </div>
  <div style="display:flex; gap:4px; margin-bottom:14px;">
    <sc-for list="{{ rpeOptions }}" as="n" hint-placeholder-count="10">
      <div onClick="{{ n.selectFn }}" style="{{ n.style }}">{{ n.value }}</div>
    </sc-for>
  </div>

  <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Ссылка на тренировку с часов</div>
  <input value="{{ activityLink }}" onChange="{{ setActivityLink }}" placeholder="strava.com/activities/…" style="width:100%; border:1.5px solid var(--input-border); border-radius:10px; padding:9px 12px; font-size:13px; outline:none; margin-bottom:14px; background:var(--card); color:var(--text);" />

  <sc-if value="{{ isQuestionCollapsed }}" hint-placeholder-val="{{ true }}">
    <div onClick="{{ expandQuestion }}" style="display:flex; align-items:center; gap:6px; font-size:12.5px; font-weight:700; color:var(--muted-strong); cursor:pointer; margin-bottom:16px;">
      <span style="font-size:14px;">＋</span> Вопрос тренеру
    </div>
  </sc-if>
  <sc-if value="{{ isQuestionExpanded }}" hint-placeholder-val="{{ false }}">
    <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; margin-bottom:6px;">Вопрос тренеру</div>
    <textarea value="{{ question }}" onChange="{{ setQuestion }}" placeholder="Например: болит колено после интервалов, стоит ли снизить объём завтра?" style="width:100%; min-height:44px; border:1.5px solid var(--input-border); border-radius:10px; padding:9px 12px; font-size:13px; resize:vertical; outline:none; margin-bottom:16px; background:var(--card); color:var(--text);"></textarea>
  </sc-if>

  <div onClick="{{ submit }}" style="background:#1f9d55; color:#fff; font-weight:700; font-size:13.5px; padding:13px; border-radius:12px; text-align:center; cursor:pointer;">Отправить отчёт</div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:360,&quot;height&quot;:420},&quot;dayLabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Вторник&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;workoutType&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Интервалы 6х800м&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;light&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
function getTokens(mode) {
  return mode === 'dark' ? {
    card:'#1e2427', cardBorder:'#2b3236', text:'#eef1ef', muted:'#8fa19c', mutedStrong:'#c7d0cd',
    divider:'#262d30', inputBorder:'#333c40', reportBg:'#12281b', reportBorder:'#204a30', reportText:'#8fd6ac',
    segSelectedBg:'#eef1ef', segSelectedText:'#12181a', segBg:'#272f32',
  } : {
    card:'#ffffff', cardBorder:'#e7ece5', text:'#12181a', muted:'#8a9a96', mutedStrong:'#42504d',
    divider:'#eef0ec', inputBorder:'#e0e5dd', reportBg:'#f0f9f3', reportBorder:'#cdeeda', reportText:'#1a4d2e',
    segSelectedBg:'#12181a', segSelectedText:'#ffffff', segBg:'#f0f2ee',
  };
}

class Component extends DCLogic {
  state = {
    rawComment: '', aiGenerating: false, aiResult: false, polishedText: '',
    rpe: 6, activityLink: '', question: '', questionExpanded: false,
  };

  expandQuestion = () => this.setState({ questionExpanded: true });

  setRawComment = (e) => this.setState({ rawComment: e.target.value });
  setPolishedText = (e) => this.setState({ polishedText: e.target.value });
  setActivityLink = (e) => this.setState({ activityLink: e.target.value });
  setQuestion = (e) => this.setState({ question: e.target.value });
  selectRpe = (n) => this.setState({ rpe: n });

  runAi = () => {
    if (this.state.aiGenerating) return;
    this.setState({ aiGenerating: true, aiResult: false });
    setTimeout(() => {
      this.setState({
        aiGenerating: false,
        aiResult: true,
        polishedText: 'Тренировка выполнена полностью по плану. Разминка прошла легко, на первых 3 повторах темп держался стабильно (3:55/км), на 5-6 повторе почувствовалась усталость, но целевой темп удалось сохранить. Пульс на последних отрезках выходил в верхнюю границу 4 зоны. Общее самочувствие хорошее, восстановление между повторами полное.',
      });
    }, 1500);
  };

  submit = () => {
    this.setState({ rawComment:'', aiResult:false, polishedText:'', activityLink:'', question:'' });
  };

  renderVals() {
    const s = this.state;
    const T = getTokens(this.props.theme);
    const rpeOptions = Array.from({ length:10 }, (_, i) => i + 1).map(n => ({
      value: n,
      style: `flex:1; text-align:center; padding:5px 0; border-radius:6px; font-size:11px; font-weight:700; cursor:pointer; background:${s.rpe===n ? T.segSelectedBg : T.segBg}; color:${s.rpe===n ? T.segSelectedText : T.mutedStrong};`,
      selectFn: () => this.selectRpe(n),
    }));

    return {
      rootStyle: `background:${T.card}; border-radius:20px; padding:18px; border:1px solid ${T.cardBorder}; --muted:${T.muted}; --muted-strong:${T.mutedStrong}; --divider:${T.divider}; --input-border:${T.inputBorder}; --card:${T.card}; --text:${T.text}; --report-bg:${T.reportBg}; --report-border:${T.reportBorder}; --report-text:${T.reportText};`,
      dayLabel: this.props.dayLabel ?? '', workoutType: this.props.workoutType ?? '',
      rpe: s.rpe,
      isQuestionCollapsed: !s.questionExpanded, isQuestionExpanded: s.questionExpanded, expandQuestion: this.expandQuestion,
      rawComment: s.rawComment, setRawComment: this.setRawComment,
      aiGenerating: s.aiGenerating, aiNotGenerating: !s.aiGenerating,
      aiButtonStyle: `display:flex; align-items:center; justify-content:center; gap:8px; background:${s.aiGenerating ? '#5b6b68' : '#12181a'}; color:#fff; font-weight:700; font-size:13px; padding:11px; border-radius:10px; cursor:pointer; white-space:nowrap;`,
      runAi: this.runAi,
      aiResult: s.aiResult,
      polishedText: s.polishedText, setPolishedText: this.setPolishedText,
      rpeOptions,
      activityLink: s.activityLink, setActivityLink: this.setActivityLink,
      question: s.question, setQuestion: this.setQuestion,
      submit: this.submit,
    };
  }
}

</script>
</body>
</html>
